name: Test p115strmhelper

on:
  push:
    paths:
      # utils (test_cron_utils.py)
      - 'plugins.v2/p115strmhelper/utils/cron.py'
      # utils (test_exception_utils.py)
      - 'plugins.v2/p115strmhelper/utils/exception.py'
      # utils (test_limiter.py)
      - 'plugins.v2/p115strmhelper/utils/limiter.py'
      # utils (test_path_utils.py)
      - 'plugins.v2/p115strmhelper/utils/path.py'
      # utils (test_time_utils.py)
      - 'plugins.v2/p115strmhelper/utils/time.py'
      # utils (test_url_utils.py)
      - 'plugins.v2/p115strmhelper/utils/url.py'
      # utils (test_webhook_utils.py)
      - 'plugins.v2/p115strmhelper/utils/webhook.py'
      - 'plugins.v2/p115strmhelper/tests/**'
      - '.github/workflows/test-p115strmhelper.yml'
  pull_request:
    paths:
      # utils (test_cron_utils.py)
      - 'plugins.v2/p115strmhelper/utils/cron.py'
      # utils (test_exception_utils.py)
      - 'plugins.v2/p115strmhelper/utils/exception.py'
      # utils (test_limiter.py)
      - 'plugins.v2/p115strmhelper/utils/limiter.py'
      # utils (test_path_utils.py)
      - 'plugins.v2/p115strmhelper/utils/path.py'
      # utils (test_time_utils.py)
      - 'plugins.v2/p115strmhelper/utils/time.py'
      # utils (test_url_utils.py)
      - 'plugins.v2/p115strmhelper/utils/url.py'
      # utils (test_webhook_utils.py)
      - 'plugins.v2/p115strmhelper/utils/webhook.py'
      - 'plugins.v2/p115strmhelper/tests/**'
      - '.github/workflows/test-p115strmhelper.yml'
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout plugin code
        uses: actions/checkout@v6

      - name: Checkout MoviePilot
        uses: actions/checkout@v6
        with:
          repository: jxxghp/MoviePilot
          path: MoviePilot

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'MoviePilot/requirements.txt'

      - name: Install dependencies
        run: |
          pip install -r MoviePilot/requirements.txt

      - name: Run tests
        working-directory: plugins.v2/p115strmhelper
        env:
          PYTHONPATH: ${{ github.workspace }}/MoviePilot${{ matrix.os == 'windows-latest' && ';' || ':' }}${{ github.workspace }}/plugins.v2/p115strmhelper
        run: |
          python -m unittest discover -s tests -v
